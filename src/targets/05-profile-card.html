<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        width: 400px;
        height: 300px;
        background: #0d0b1f;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: 300px;
        height: 200px;
        background: #16142e;
        border: 1px solid #2c2950;
        border-radius: 12px;
        overflow: hidden;
      }
      .head {
        height: 70px;
        background: #3a36c4;
      }
      .avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #ffb020;
        margin: -32px 0 0 24px;
        border: 4px solid #16142e;
      }
      .line {
        height: 12px;
        border-radius: 6px;
        background: #2c2950;
        margin: 18px 24px 0;
      }
      .short {
        width: 140px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="head"></div>
      <div class="avatar"></div>
      <div class="line"></div>
      <div class="line short"></div>
    </div>
  </body>
</html>
