<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        width: 400px;
        height: 300px;
        background: #0d0b1f;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .outer,
      .mid {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .outer {
        width: 240px;
        height: 240px;
        background: #3a36c4;
      }
      .mid {
        width: 150px;
        height: 150px;
        background: #2dd4bf;
      }
      .inner {
        width: 70px;
        height: 70px;
        background: #ffb020;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="mid">
        <div class="inner"></div>
      </div>
    </div>
  </body>
</html>
